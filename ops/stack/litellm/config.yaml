model_list:
  - model_name: t1-default
    litellm_params:
      model:  openai/gpt-5-nano
      api_key: os.environ/OPENAI_API_KEY
      allowed_openai_params: ["reasoning_effort"]
      reasoning_effort: minimal

  - model_name: t1-batch
    litellm_params:
      model:  openai/gpt-5-nano
      api_key: os.environ/OPENAI_API_KEY
      allowed_openai_params: ["reasoning_effort"]
      reasoning_effort: minimal

  - model_name: t2-sync-direct
    litellm_params:
      model:  openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY
      allowed_openai_params: ["reasoning_effort"]
      reasoning_effort: low

  - model_name: t2-chunk-note
    litellm_params:
      model:  openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY
      allowed_openai_params: ["reasoning_effort"]
      reasoning_effort: low

  - model_name: t2-synthesis
    litellm_params:
      model:  openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY
      allowed_openai_params: ["reasoning_effort"]
      reasoning_effort: low

files_settings:
  - custom_llm_provider: "openai"
    api_key: os.environ/OPENAI_API_KEY
